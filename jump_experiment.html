<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Jumping Experiment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --stone: #2c2416;
    --parchment: #f5edd6;
    --parchment-dark: #e8d9b8;
    --ink: #1a1208;
    --gold: #c9922a;
    --gold-light: #e8b84b;
    --red: #8b2020;
    --muted: #7a6a50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--stone);
    font-family: 'Crimson Text', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
  }

  .container {
    background: var(--parchment);
    border: 3px solid var(--gold);
    border-radius: 4px;
    max-width: 820px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .header {
    background: var(--stone);
    border-bottom: 2px solid var(--gold);
    padding: 12px 20px;
    text-align: center;
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold-light);
    font-size: 1.2rem;
    letter-spacing: 0.08em;
  }

  .mode-bar {
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding: 12px 20px;
    background: rgba(201,146,42,0.06);
    border-bottom: 2px solid var(--parchment-dark);
  }
  .mode-bar label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    cursor: pointer;
  }
  .mode-bar input[type="radio"] {
    accent-color: var(--gold);
    width: 15px; height: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 260px;
  }

  /* ── Arena ── */
  .arena {
    position: relative;
    height: 380px;
    background: linear-gradient(180deg, #7aa8c8 0%, #a8c8e0 40%, #c8dce8 100%);
    border-right: 2px solid var(--parchment-dark);
    overflow: hidden;
  }

  .ruler {
    position: absolute;
    left: 0; top: 0; bottom: 30px;
    width: 28px;
    background: rgba(0,0,0,0.12);
    border-right: 1px solid rgba(0,0,0,0.15);
    z-index: 5;
  }
  .ruler-tick {
    position: absolute;
    right: 0;
    width: 7px; height: 1px;
    background: rgba(255,255,255,0.55);
  }
  .ruler-lbl {
    position: absolute;
    right: 10px;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.75);
    transform: translateY(-50%);
    font-family: 'Cinzel', serif;
  }

  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #7a6040 0%, #5a4020 100%);
    border-top: 3px solid #a08050;
    z-index: 3;
  }

  /* each spoon sits absolutely in the arena */
  .spoon-wrap {
    position: absolute;
    bottom: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 4;
  }

  /* label above spoon */
  .spoon-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: #f5edd6;
    letter-spacing: 0.04em;
    line-height: 1.5;
    text-align: center;
    white-space: nowrap;
    margin-bottom: 6px;
    background: rgba(30,20,8,0.72);
    border: 1px solid rgba(201,146,42,0.4);
    border-radius: 4px;
    padding: 3px 8px;
  }

  .peak-line {
    position: absolute;
    left: 28px; right: 0;
    height: 1px;
    border-top: 1px dashed rgba(255,255,255,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 2;
  }
  .peak-badge {
    position: absolute;
    right: 4px; top: -14px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 0.58rem;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    white-space: nowrap;
  }

  /* ── Data panel ── */
  .data-panel {
    padding: 14px 13px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    background: var(--parchment);
  }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.76rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--parchment-dark);
    padding-bottom: 5px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: var(--stone); }
  thead th {
    font-family: 'Cinzel', serif;
    font-size: 0.57rem;
    color: var(--gold-light);
    padding: 5px 4px;
    text-align: center;
    letter-spacing: 0.03em;
  }
  tbody tr { border-bottom: 1px solid var(--parchment-dark); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.new-row { animation: rowIn 0.4s ease-out; }
  @keyframes rowIn {
    from { background: rgba(201,146,42,0.35); }
    to   { background: transparent; }
  }
  td { padding: 5px 4px; text-align: center; color: var(--ink); }
  td:first-child { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
  .empty-hint { color: var(--muted); font-style: italic; font-size: 0.82rem; padding: 10px 0; text-align: center; }

  .observe-box {
    background: rgba(201,146,42,0.08);
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 3px;
    padding: 9px 11px;
    font-size: 0.83rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }
  .observe-box strong {
    font-style: normal;
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    display: block;
    margin-bottom: 3px;
    letter-spacing: 0.05em;
  }

  .answer-btn {
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    text-align: left;
    background: var(--parchment-dark);
    border: 1.5px solid rgba(201,146,42,0.3);
    border-radius: 3px;
    padding: 8px 10px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    line-height: 1.4;
  }
  .answer-btn:hover:not(:disabled) { background: rgba(201,146,42,0.18); border-color: var(--gold); }
  .answer-btn.correct { background: rgba(60,120,60,0.15); border-color: #4a8a4a; color: #2a5a2a; font-weight: 600; }
  .answer-btn.wrong   { background: rgba(139,32,32,0.1);  border-color: var(--red); color: var(--red); }
  .answer-btn:disabled { cursor: default; }
  .answer-feedback { font-size: 0.82rem; line-height: 1.5; color: var(--ink); font-style: italic; }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    border-top: 2px solid var(--parchment-dark);
    background: rgba(201,146,42,0.04);
  }
  .jump-btn {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    background: var(--stone);
    color: var(--gold-light);
    border: 2px solid var(--gold);
    padding: 10px 38px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  .jump-btn:hover:not(:disabled) { background: var(--gold); color: var(--stone); transform: translateY(-1px); }
  .jump-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>The Jumping Experiment</h1>
  </div>

  <div class="mode-bar">
    <label>
      <input type="radio" name="mode" value="weight" checked onchange="setMode('weight')">
      Test whether weight affects jumping height
    </label>
    <label>
      <input type="radio" name="mode" value="speed" onchange="setMode('speed')">
      Test whether starting speed affects jumping height
    </label>
  </div>

  <div class="main">
    <div class="arena" id="arena">
      <div class="ruler" id="ruler"></div>

      <div class="peak-line" id="peak0"><div class="peak-badge" id="peakBadge0"></div></div>
      <div class="peak-line" id="peak1"><div class="peak-badge" id="peakBadge1"></div></div>
      <div class="peak-line" id="peak2"><div class="peak-badge" id="peakBadge2"></div></div>

      <div class="spoon-wrap" id="wrap0"><div class="spoon-label" id="lbl0"></div></div>
      <div class="spoon-wrap" id="wrap1"><div class="spoon-label" id="lbl1"></div></div>
      <div class="spoon-wrap" id="wrap2"><div class="spoon-label" id="lbl2"></div></div>

      <div class="ground"></div>
    </div>

    <div class="data-panel">
      <div class="panel-title">Observations</div>
      <table>
        <thead>
          <tr>
            <th id="colHeader">Spoon</th>
            <th>Height (m)</th>
            <th>Air Time (s)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="3" class="empty-hint">Press Jump! to begin</td></tr>
        </tbody>
      </table>

      <div class="observe-box" id="observeBox">
        <strong>What do you notice?</strong>
        Press Jump! and watch carefully.
      </div>

      <div id="answerSection" style="display:none; flex-direction:column; gap:7px;">
        <div class="panel-title" id="answerTitle"></div>
        <button class="answer-btn" id="ansYes" onclick="checkAnswer(true)">⬆️ Yes — it makes a difference</button>
        <button class="answer-btn" id="ansNo"  onclick="checkAnswer(false)">⚖️ No — it doesn't matter</button>
        <div class="answer-feedback" id="answerFeedback"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="jump-btn" id="jumpBtn" onclick="doJump()">Jump!</button>
  </div>
</div>

<script>
  const G        = 10;
  const PX_PER_M = 44;
  const ARENA_H  = 380;
  const GROUND_H = 30;

  const SPOON_XS = [60, 180, 300]; // left px positions in arena

  const MODES = {
    weight: {
      spoons: [
        { name: 'Light',  detail: '5g · 10 m/s',  v: 10, color: '#7ab0d8' },
        { name: 'Medium', detail: '15g · 10 m/s', v: 10, color: '#80c880' },
        { name: 'Heavy',  detail: '25g · 10 m/s', v: 10, color: '#d89880' },
      ],
      colHeader: 'Spoon (mass)',
      question: 'Does weight affect jump height?',
      correctIsYes: false,
      feedbackCorrect: '✓ Correct! All three reach exactly the same height. Weight doesn\'t affect jump height — gravity accelerates everything equally regardless of mass.',
      feedbackWrong: 'Look at the height column — are those numbers actually different? Press Jump! again and look closely!',
    },
    speed: {
      spoons: [
        { name: 'Slow',   detail: '10g · 5 m/s',  v: 5,  color: '#7ab0d8' },
        { name: 'Medium', detail: '10g · 9 m/s',  v: 9,  color: '#80c880' },
        { name: 'Fast',   detail: '10g · 10 m/s', v: 10, color: '#d89880' },
      ],
      colHeader: 'Spoon (speed)',
      question: 'Does starting speed affect jump height?',
      correctIsYes: true,
      feedbackCorrect: '✓ Correct! Starting speed makes a huge difference. The faster you launch, the higher you go: h = v² ÷ (2g).',
      feedbackWrong: 'Look at the height column — are those all the same? Press Jump! again and watch carefully!',
    }
  };

  let mode = 'weight';
  let jumping = false;
  let jumpsDone = 0;
  let answerRevealed = false;
  let answerShown = false;

  function spoonSVG(color) {
    return `<svg width="38" height="42" viewBox="0 0 38 42" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="19" cy="13" rx="11" ry="10" fill="${color}" stroke="#5a4a30" stroke-width="1.2"/>
      <ellipse cx="19" cy="12" rx="8" ry="7" fill="white" opacity="0.22"/>
      <rect x="17.5" y="22" width="3" height="16" rx="1.5" fill="${color}" stroke="#5a4a30" stroke-width="1"/>
      <circle cx="15" cy="12" r="1.6" fill="#1a1208"/>
      <circle cx="23" cy="12" r="1.6" fill="#1a1208"/>
      <path d="M16 16.5 Q19 19.5 22 16.5" stroke="#1a1208" stroke-width="1" fill="none" stroke-linecap="round"/>
    </svg>`;
  }

  function buildRuler() {
    const ruler = document.getElementById('ruler');
    ruler.innerHTML = '';
    const maxM = Math.floor((ARENA_H - GROUND_H) / PX_PER_M);
    for (let m = 0; m <= maxM; m++) {
      const yFromTop = (ARENA_H - GROUND_H) - m * PX_PER_M;
      const tick = document.createElement('div');
      tick.className = 'ruler-tick';
      tick.style.top = yFromTop + 'px';
      ruler.appendChild(tick);
      if (m > 0) {
        const lbl = document.createElement('div');
        lbl.className = 'ruler-lbl';
        lbl.style.top = yFromTop + 'px';
        lbl.textContent = m + 'm';
        ruler.appendChild(lbl);
      }
    }
  }

  function setMode(newMode) {
    if (jumping) return;
    mode = newMode;
    jumpsDone = 0;
    answerRevealed = false;
    answerShown = false;

    const cfg = MODES[mode];
    document.getElementById('colHeader').textContent = cfg.colHeader;
    document.getElementById('answerTitle').textContent = cfg.question;

    cfg.spoons.forEach((s, i) => {
      const wrap = document.getElementById('wrap' + i);

      // set horizontal position
      wrap.style.left = SPOON_XS[i] + 'px';
      // reset vertical
      wrap.style.transform = 'translateY(0)';

      // replace svg
      const old = wrap.querySelector('svg');
      if (old) old.remove();
      const tmp = document.createElement('div');
      tmp.innerHTML = spoonSVG(s.color);
      const lbl = document.getElementById('lbl' + i);
      wrap.insertBefore(tmp.firstChild, lbl);

      // label
      lbl.innerHTML = s.name + '<br><span style="font-style:italic;font-family:\'Crimson Text\',serif;font-size:0.68rem;color:#e8d9b8;">' + s.detail + '</span>';

      // hide peak lines
      document.getElementById('peak' + i).style.opacity = '0';
    });

    // reset right panel
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="3" class="empty-hint">Press Jump! to begin</td></tr>';
    document.getElementById('observeBox').innerHTML =
      '<strong>What do you notice?</strong>Press Jump! and watch carefully.';
    document.getElementById('answerSection').style.display = 'none';
    document.getElementById('answerFeedback').innerHTML = '';
    document.querySelectorAll('.answer-btn').forEach(b => {
      b.disabled = false;
      b.classList.remove('correct', 'wrong');
    });
    document.getElementById('jumpBtn').disabled = false;
  }

  function doJump() {
    if (jumping) return;
    jumping = true;
    document.getElementById('jumpBtn').disabled = true;

    const cfg = MODES[mode];
    const results = cfg.spoons.map(s => ({
      v: s.v,
      h: (s.v * s.v) / (2 * G),
      t: (2 * s.v) / G,
    }));

    // set peak line positions
    results.forEach((r, i) => {
      const pl = document.getElementById('peak' + i);
      pl.style.bottom = (GROUND_H + r.h * PX_PER_M) + 'px';
      pl.style.top = 'auto';
      document.getElementById('peakBadge' + i).textContent = r.h.toFixed(2) + 'm';
      pl.style.opacity = '0';
    });

    const maxT   = Math.max(...results.map(r => r.t));
    const startMs = performance.now();
    const totalMs = maxT * 1000 + 400;

    function frame(now) {
      const elapsed = (now - startMs) / 1000;

      results.forEach((r, i) => {
        const tClamped = Math.min(elapsed, r.t);
        const yM  = r.v * tClamped - 0.5 * G * tClamped * tClamped;
        const yPx = Math.max(0, yM) * PX_PER_M;
        document.getElementById('wrap' + i).style.transform = `translateY(${-yPx}px)`;

        if (elapsed >= r.t * 0.45) {
          document.getElementById('peak' + i).style.opacity = '0.75';
        }
      });

      if (elapsed < totalMs / 1000) {
        requestAnimationFrame(frame);
      } else {
        results.forEach((r, i) => {
          document.getElementById('wrap' + i).style.transform = 'translateY(0)';
        });
        onLanded(cfg, results);
      }
    }

    requestAnimationFrame(frame);
  }

  function onLanded(cfg, results) {
    jumping = false;
    jumpsDone++;

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    cfg.spoons.forEach((s, i) => {
      const r = results[i];
      const tr = document.createElement('tr');
      tr.className = 'new-row';
      tr.innerHTML = `<td>${s.name}</td><td>${r.h.toFixed(2)}</td><td>${r.t.toFixed(2)}</td>`;
      tbody.appendChild(tr);
      setTimeout(() => tr.classList.remove('new-row'), 500);
    });

    const msgs = [
      'Look at the numbers — do they change between spoons?',
      'Does the pattern match what you expected?',
    ];
    document.getElementById('observeBox').innerHTML =
      `<strong>What do you notice?</strong>${msgs[Math.min(jumpsDone - 1, 1)]}`;

    if (!answerShown) {
      answerShown = true;
      const sec = document.getElementById('answerSection');
      sec.style.display = 'flex';
      sec.style.flexDirection = 'column';
    }

    document.getElementById('jumpBtn').disabled = false;
  }

  function checkAnswer(answeredYes) {
    if (answerRevealed) return;
    answerRevealed = true;
    const cfg = MODES[mode];
    const correct = answeredYes === cfg.correctIsYes;

    document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
    document.getElementById(answeredYes ? 'ansYes' : 'ansNo')
      .classList.add(correct ? 'correct' : 'wrong');
    document.getElementById(cfg.correctIsYes ? 'ansYes' : 'ansNo')
      .classList.add('correct');

    const fb = document.getElementById('answerFeedback');
    if (correct) {
      fb.innerHTML = cfg.feedbackCorrect;
    } else {
      fb.innerHTML = cfg.feedbackWrong;
      // leave wrong answer message up — player can click the other button themselves
      document.querySelectorAll('.answer-btn').forEach(b => b.disabled = false);
      answerRevealed = false;
    }
  }

  buildRuler();
  setMode('weight');
</script>
</body>
</html>
